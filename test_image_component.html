<!DOCTYPE html>
<html>
<head>
    <title>Test Image Component</title>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-6">Test Image Input Component</h1>
        
        <!-- Single Image Mode -->
        <div class="mb-8">
            <h2 class="text-lg font-semibold mb-4">Single Image Mode</h2>
            <div class="image-input-component" 
                 x-data="imageInputHandler('cover_image', false, null)">
                
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    Cover Image
                </label>

                <!-- Media Library Picker Button -->
                <div class="flex flex-col gap-4 mb-4">
                    <button type="button" @click="openMediaPicker()" 
                            class="w-full border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-indigo-500 hover:bg-indigo-50/30 transition group bg-gray-50/50 flex flex-col items-center justify-center gap-3">
                        <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover:scale-110 transition-transform shadow-sm">
                            <i class="fas fa-images text-2xl"></i>
                        </div>
                        <p class="text-lg font-black text-slate-800 tracking-tight">Pilih dari Media Library</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            Pilih gambar dari galeri pusat
                        </p>
                    </button>
                </div>

                <!-- Selected Media Preview -->
                <div class="grid gap-4 mb-4 grid-cols-1" x-show="selectedMedia.length > 0">
                    <template x-for="(item, idx) in selectedMedia" :key="'media-' + item.id">
                        <div class="relative aspect-square rounded-lg overflow-hidden border-2 border-indigo-500 shadow-lg group">
                            <img :src="item.thumbnail_url || item.url" 
                                 :alt="item.alt_text || 'Selected image'"
                                 class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <button type="button" @click="removeSelectedMedia(idx)" 
                                        class="w-8 h-8 rounded-lg bg-rose-500 text-white flex items-center justify-center shadow-lg hover:bg-rose-600 transition">
                                    <i class="fas fa-times text-xs"></i>
                                </button>
                            </div>
                            <input type="hidden" 
                                   name="cover_image_media_id" 
                                   :value="item.id">
                            <div class="absolute top-1 right-1 bg-indigo-600 text-[7px] text-white px-2 py-1 rounded-full font-black tracking-widest">LIBRARY</div>
                        </div>
                    </template>
                </div>

                <!-- Local File Upload -->
                <div class="mt-4 flex flex-col gap-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        Atau Upload Gambar Baru dari Perangkat
                    </label>
                    <input type="file" 
                           name="cover_image" 
                           accept="image/*"
                           @change="handleLocalFiles($event)" 
                           class="block w-full text-xs text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-widest file:bg-slate-900 file:text-white hover:file:bg-slate-800 transition cursor-pointer">
                </div>

                <!-- Local Files Preview -->
                <div class="grid gap-4 mt-4 grid-cols-1" x-show="localPreviews.length > 0">
                    <template x-for="(preview, idx) in localPreviews" :key="'local-' + idx">
                        <div class="relative aspect-square rounded-lg overflow-hidden border-2 border-emerald-500 shadow-lg group">
                            <img :src="preview.url" 
                                 :alt="preview.file.name"
                                 class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <button type="button" @click="removeLocalFile(idx)" 
                                        class="w-8 h-8 rounded-lg bg-rose-500 text-white flex items-center justify-center shadow-lg hover:bg-rose-600 transition">
                                    <i class="fas fa-times text-xs"></i>
                                </button>
                            </div>
                            <div class="absolute top-1 right-1 bg-emerald-600 text-[7px] text-white px-2 py-1 rounded-full font-black tracking-widest">LOCAL</div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
        
        <!-- Multiple Image Mode -->
        <div class="mb-8">
            <h2 class="text-lg font-semibold mb-4">Multiple Image Mode</h2>
            <div class="image-input-component" 
                 x-data="imageInputHandler('package_images', true, null)">
                
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    Package Images
                </label>

                <!-- Similar structure but with multiple=true -->
                <div class="flex flex-col gap-4 mb-4">
                    <button type="button" @click="openMediaPicker()" 
                            class="w-full border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-indigo-500 hover:bg-indigo-50/30 transition group bg-gray-50/50 flex flex-col items-center justify-center gap-3">
                        <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover:scale-110 transition-transform shadow-sm">
                            <i class="fas fa-images text-2xl"></i>
                        </div>
                        <p class="text-lg font-black text-slate-800 tracking-tight">Pilih dari Media Library</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            Pilih satu atau lebih gambar dari galeri
                        </p>
                    </button>
                </div>

                <div class="grid gap-4 mb-4 grid-cols-3 sm:grid-cols-4 md:grid-cols-6" x-show="selectedMedia.length > 0">
                    <template x-for="(item, idx) in selectedMedia" :key="'media-' + item.id">
                        <div class="relative aspect-square rounded-lg overflow-hidden border-2 border-indigo-500 shadow-lg group">
                            <img :src="item.thumbnail_url || item.url" 
                                 class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <button type="button" @click="removeSelectedMedia(idx)" 
                                        class="w-8 h-8 rounded-lg bg-rose-500 text-white flex items-center justify-center shadow-lg">
                                    <i class="fas fa-times text-xs"></i>
                                </button>
                            </div>
                            <input type="hidden" 
                                   name="package_images_media_ids[]" 
                                   :value="item.id">
                            <div class="absolute top-1 right-1 bg-indigo-600 text-[7px] text-white px-2 py-1 rounded-full font-black tracking-widest">LIBRARY</div>
                        </div>
                    </template>
                </div>

                <div class="mt-4 flex flex-col gap-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        Atau Upload Gambar Baru dari Perangkat
                    </label>
                    <input type="file" 
                           name="package_images[]" 
                           multiple
                           accept="image/*"
                           @change="handleLocalFiles($event)" 
                           class="block w-full text-xs text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-widest file:bg-slate-900 file:text-white hover:file:bg-slate-800 transition cursor-pointer">
                </div>

                <div class="grid gap-4 mt-4 grid-cols-3 sm:grid-cols-4 md:grid-cols-6" x-show="localPreviews.length > 0">
                    <template x-for="(preview, idx) in localPreviews" :key="'local-' + idx">
                        <div class="relative aspect-square rounded-lg overflow-hidden border-2 border-emerald-500 shadow-lg group">
                            <img :src="preview.url" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <button type="button" @click="removeLocalFile(idx)" 
                                        class="w-8 h-8 rounded-lg bg-rose-500 text-white flex items-center justify-center shadow-lg">
                                    <i class="fas fa-times text-xs"></i>
                                </button>
                            </div>
                            <div class="absolute top-1 right-1 bg-emerald-600 text-[7px] text-white px-2 py-1 rounded-full font-black tracking-widest">LOCAL</div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Simulate Media Modal -->
    <script>
        function imageInputHandler(fieldName, isMultiple, initialValue = null) {
            return {
                selectedMedia: [],
                localPreviews: [],
                fileInputRef: null,

                init() {
                    this.fileInputRef = this.$el.querySelector('input[type="file"]');
                },

                openMediaPicker() {
                    // Simulate media picker - in real app this opens the modal
                    const mockMediaItem = {
                        id: Math.random(),
                        url: 'https://picsum.photos/400/300?random=' + Math.random(),
                        thumbnail_url: 'https://picsum.photos/200/150?random=' + Math.random(),
                        alt_text: 'Sample image'
                    };
                    
                    if (isMultiple) {
                        this.selectedMedia.push(mockMediaItem);
                    } else {
                        this.selectedMedia = [mockMediaItem];
                    }
                },

                removeSelectedMedia(index) {
                    this.selectedMedia.splice(index, 1);
                },

                handleLocalFiles(event) {
                    const files = Array.from(event.target.files || []);
                    
                    if (!isMultiple) {
                        this.clearPreviews();
                        this.selectedMedia = [];
                    }
                    
                    files.forEach(file => {
                        if (file.type.startsWith('image/')) {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                this.localPreviews.push({
                                    file: file,
                                    url: e.target.result
                                });
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                },

                removeLocalFile(index) {
                    this.localPreviews.splice(index, 1);
                    
                    if (this.fileInputRef) {
                        const newInput = this.fileInputRef.cloneNode(true);
                        newInput.value = '';
                        this.fileInputRef.parentNode.replaceChild(newInput, this.fileInputRef);
                        this.fileInputRef = newInput;
                        
                        newInput.addEventListener('change', (e) => this.handleLocalFiles(e));
                    }
                },

                clearPreviews() {
                    this.localPreviews.forEach(preview => {
                        URL.revokeObjectURL(preview.url);
                    });
                    this.localPreviews = [];
                }
            }
        }
    </script>
</body>
</html>
