name: Test & Deploy to Production 🚀

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PHP_VERSION: '8.3'

jobs:
  # Test Laravel Application
  tests:
    name: 🧪 Run Tests & Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: pdo, pdo_sqlite, mbstring, openssl, json, tokenizer, xml, fileinfo

    - name: 📦 Install Composer dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: 🔐 Generate application key
      run: php artisan key:generate --env=testing

    - name: 🧪 Run Unit Tests
      run: php artisan test --testsuite=Unit

    - name: 🧪 Run Feature Tests
      run: php artisan test --testsuite=Feature

    - name: 🎨 Check code style (PSR-12)
      run: ./vendor/bin/pint --test
      continue-on-error: true

  # Deploy to Production
  deploy:
    name: 🚀 Deploy to Production
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Checkout code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: pdo, pdo_mysql, mbstring, openssl, json, tokenizer, xml, fileinfo

    - name: 📦 Install Composer dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

    - name: 📂 Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        # Explicit TLS (FTPS) — credentials & files no longer travel in plaintext.
        protocol: ftps
        timeout: 1800000
        log-level: verbose
        server-dir: public_html/
        state-name: .ftp-deploy-sync-state.json
        exclude: |
          **/.git/**
          **/.git*
          **/node_modules/**
          **/vendor/**
          vendor.zip
          **/tests/**
          **/storage/logs/**
          **/storage/framework/views/**
          **/storage/framework/cache/**
          **/storage/framework/sessions/**
          **/storage/app/public/**
          **/public/storage/**
          **/public/storage
          storage/logs/**
          storage/framework/views/**
          storage/framework/cache/**
          storage/framework/sessions/**
          storage/app/public/**
          public/storage/**
          **/.vscode/**
          optimize.bat
          PRODUKSI.md
          rekap_project.md
          ssh.md
          informasi.md
          DEPLOY.md
          CLAUDE.md
          PROJECT_KNOWLEDGE.md
          task.md
          android-build/**
          .github/**
          .env.example
          .env.production.example
          composer.json
          composer.lock
          package.json
          package-lock.json
          vite.config.js

    - name: 🔔 Deployment Notification
      run: echo "✅ Deployment completed at $(date)"
